name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      backend_url:
        description: "Backend API URL (overrides default)"
        required: false
  release:
    types: [published]

env:
  JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
  ANDROID_HOME: /usr/lib/android-sdk

jobs:
  check-changes:
    name: Check frontend changes
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    outputs:
      frontend_changed: ${{ steps.check.outputs.changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if frontend changed since last release
        id: check
        run: |
          # Find the previous tag before the current one
          CURRENT_TAG="${{ github.event.release.tag_name }}"
          PREV_TAG=$(git tag --sort=-creatordate | grep -v "^${CURRENT_TAG}$" | head -n 1)
          if [ -z "$PREV_TAG" ]; then
            echo "No previous tag found, building"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            CHANGES=$(git diff --name-only "$PREV_TAG" "$CURRENT_TAG" -- frontend/ export_presets.cfg.ci)
            if [ -n "$CHANGES" ]; then
              echo "Frontend changed since $PREV_TAG:"
              echo "$CHANGES"
              echo "changed=true" >> "$GITHUB_OUTPUT"
            else
              echo "No frontend changes since $PREV_TAG, skipping build"
              echo "changed=false" >> "$GITHUB_OUTPUT"
            fi
          fi

  build-android:
    name: Build Release APK
    runs-on: ubuntu-latest
    needs: check-changes
    if: >-
      github.event_name == 'workflow_dispatch' ||
      needs.check-changes.outputs.frontend_changed == 'true'
    container:
      image: barichello/godot-ci:4.6
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install missing dependencies
        run: apt-get update && apt-get install -y libfontconfig1

      - name: Setup Android build environment
        run: |
          # Install build-tools 34 to match target SDK in export preset
          yes | $ANDROID_HOME/cmdline-tools/cmdline-tools/bin/sdkmanager --licenses > /dev/null 2>&1
          $ANDROID_HOME/cmdline-tools/cmdline-tools/bin/sdkmanager "build-tools;34.0.0" "platforms;android-34"

          # GitHub Actions remaps HOME to /github/home inside containers.
          # Symlink the Docker image's config and templates so Godot finds them.
          mkdir -p /github/home/.local/share /github/home/.config
          ln -sf /root/.local/share/godot /github/home/.local/share/godot
          ln -sf /root/.config/godot /github/home/.config/godot

          # Write editor settings with correct paths (format=3 required for Godot 4.x)
          printf '%s\n' \
            '[gd_resource type="EditorSettings" format=3]' \
            '' \
            '[resource]' \
            'export/android/java_sdk_path = "/usr/lib/jvm/java-17-openjdk-amd64"' \
            'export/android/android_sdk_path = "/usr/lib/android-sdk"' \
            'export/android/debug_keystore = "/github/home/release.keystore"' \
            'export/android/debug_keystore_user = "${{ secrets.KEYSTORE_ALIAS }}"' \
            'export/android/debug_keystore_pass = "${{ secrets.KEYSTORE_ALIAS_PASSWORD }}"' \
            > /root/.config/godot/editor_settings-4.6.tres

      - name: Decode release keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > /github/home/release.keystore

      - name: Inject backend URL
        run: |
          BACKEND_URL="${{ inputs.backend_url || secrets.BACKEND_URL }}"
          if [ -n "$BACKEND_URL" ]; then
            sed -i "s|const BASE_URL := \".*\"|const BASE_URL := \"${BACKEND_URL}\"|" frontend/scripts/autoload/network.gd
            echo "Backend URL set to: $BACKEND_URL"
          else
            echo "No backend URL provided, keeping default from source"
          fi

      - name: Inject app version
        if: github.event_name == 'release'
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          sed -i "s|const VERSION := \".*\"|const VERSION := \"${VERSION}\"|" frontend/scripts/autoload/game_state.gd
          echo "App version set to: $VERSION"

      - name: Setup export preset
        run: |
          cp frontend/export_presets.cfg.ci frontend/export_presets.cfg
          sed -i 's|keystore/release=""|keystore/release="/github/home/release.keystore"|' frontend/export_presets.cfg
          sed -i 's|keystore/release_user=""|keystore/release_user="${{ secrets.KEYSTORE_ALIAS }}"|' frontend/export_presets.cfg
          sed -i 's|keystore/release_password=""|keystore/release_password="${{ secrets.KEYSTORE_ALIAS_PASSWORD }}"|' frontend/export_presets.cfg

      - name: Import Godot project
        run: |
          # First import may fail as Godot generates the .godot cache
          godot --headless --import --path frontend || true
          # Second import should succeed
          godot --headless --import --path frontend || true

      - name: Build APK
        run: |
          mkdir -p frontend/export
          godot --headless --export-release "Android" export/tacklefish.apk --path frontend

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: tacklefish-release-apk
          path: frontend/export/tacklefish.apk
          retention-days: 14

      - name: Upload APK to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          apt-get install -y gh
          gh release upload "${{ github.event.release.tag_name }}" \
            frontend/export/tacklefish.apk#"Tacklefish APK" \
            --repo "${{ github.repository }}"

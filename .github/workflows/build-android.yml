name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      backend_url:
        description: "Backend API URL (overrides default)"
        required: false

jobs:
  build-android:
    name: Build Debug APK
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.6

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Android SDK
        run: |
          # Install OpenJDK 17
          apt-get update && apt-get install -y openjdk-17-jdk-headless wget unzip
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64

          # Download Android command-line tools (version 13.0 - Jan 2025)
          mkdir -p /opt/android-sdk/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O /tmp/cmdline-tools.zip
          unzip -q /tmp/cmdline-tools.zip -d /opt/android-sdk/cmdline-tools
          mv /opt/android-sdk/cmdline-tools/cmdline-tools /opt/android-sdk/cmdline-tools/latest

          # Accept licenses and install required SDK components
          export ANDROID_HOME=/opt/android-sdk
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platform-tools" "build-tools;34.0.0" "platforms;android-34"

      - name: Configure Godot editor settings
        run: |
          mkdir -p /root/.config/godot
          cat > /root/.config/godot/editor_settings-4.tres <<'SETTINGS'
          [gd_resource type="EditorSettings"]

          [resource]
          export/android/java_sdk_path = "/usr/lib/jvm/java-17-openjdk-amd64"
          export/android/android_sdk_path = "/opt/android-sdk"
          export/android/debug_keystore = "/github/home/debug.keystore"
          export/android/debug_keystore_user = "androiddebugkey"
          export/android/debug_keystore_pass = "android"
          SETTINGS

      - name: Generate debug keystore
        run: |
          keytool -genkeypair \
            -alias androiddebugkey \
            -keypass android \
            -keystore /github/home/debug.keystore \
            -storepass android \
            -dname "CN=Android Debug,O=Android,C=US" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000

      - name: Inject backend URL
        run: |
          BACKEND_URL="${{ inputs.backend_url || secrets.BACKEND_URL }}"
          if [ -n "$BACKEND_URL" ]; then
            sed -i "s|const BASE_URL := \".*\"|const BASE_URL := \"${BACKEND_URL}\"|" frontend/scripts/autoload/network.gd
            echo "Backend URL set to: $BACKEND_URL"
          else
            echo "No backend URL provided, keeping default from source"
          fi

      - name: Setup export preset
        run: cp frontend/export_presets.cfg.ci frontend/export_presets.cfg

      - name: Import Godot project
        run: |
          # First import may fail as Godot generates the .godot cache
          godot --headless --import --path frontend || true
          # Second import should succeed
          godot --headless --import --path frontend || true

      - name: Build APK
        run: |
          mkdir -p frontend/export
          godot --headless --export-debug "Android" frontend/export/tacklefish.apk --path frontend

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: tacklefish-debug-apk
          path: frontend/export/tacklefish.apk
          retention-days: 14

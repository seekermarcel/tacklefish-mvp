services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - DB_PATH=/data/tacklefish.db
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - ADDR=:8080
    volumes:
      - tacklefish-data:/data
    restart: unless-stopped

volumes:
  tacklefish-data:
